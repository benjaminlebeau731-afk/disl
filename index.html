<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Direct USB Color Control</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        .container { border: 2px solid #444; padding: 30px; border-radius: 20px; display: inline-block; background: #2a2a2a; }
        input[type="color"] { width: 200px; height: 200px; border: none; cursor: pointer; background: none; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        button:hover { background: #0056b3; }
        #status { margin-top: 15px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>USB HID Color</h1>
        <button id="connectBtn">1. Connect USB Device</button><br>
        
        <label for="colorPicker">2. Select Color</label><br><br>
        <input type="color" id="colorPicker" disabled>
        
        <div id="status">Status: Waiting for connection...</div>
    </div>

    <script>
        let usbDevice;
        const connectBtn = document.getElementById('connectBtn');
        const colorPicker = document.getElementById('colorPicker');
        const status = document.getElementById('status');

        connectBtn.addEventListener('click', async () => {
            try {
                // This opens a browser prompt to select a USB HID device
                const devices = await navigator.hid.requestDevice({ filters: [] });
                
                if (devices.length > 0) {
                    usbDevice = devices[0];
                    await usbDevice.open();
                    
                    status.innerText = `Connected to: ${usbDevice.productName}`;
                    colorPicker.disabled = false;
                }
            } catch (error) {
                status.innerText = "Error: " + error.message;
            }
        });

        colorPicker.addEventListener('input', async (event) => {
            if (!usbDevice || !usbDevice.opened) return;

            // Convert Hex to RGB integers
            const hex = event.target.value;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);

            // This is a standard HID 'Set Color' report format
            // Note: Byte mapping depends entirely on your specific USB hardware's firmware
            const reportId = 0x01; 
            const data = new Uint8Array([0x63, r, g, b, 0x00, 0x00, 0x00, 0x00]);

            try {
                await usbDevice.sendFeatureReport(reportId, data);
            } catch (err) {
                console.error("Failed to send color data:", err);
            }
        });
    </script>
</body>
</html>
