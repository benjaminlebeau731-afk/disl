<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeRGBW Screen Sync</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #121212; color: white; }
        button { padding: 15px 20px; margin: 10px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        #connectBtn { background-color: #008CBA; color: white; }
        #syncBtn { background-color: #4CAF50; color: white; }
        #colorPreview { width: 150px; height: 150px; margin: 20px auto; border: 3px solid white; border-radius: 15px; background-color: black; }
        video, canvas { display: none; }
        #log { margin-top: 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <h2>MeRGBW Monitor Sync</h2>
    
    <button id="connectBtn">1. Connect MeRGBW</button>
    <button id="syncBtn">2. Start Screen Sync</button>

    <div id="colorPreview"></div>
    <div id="log">Waiting to connect...</div>

    <video id="video" autoplay></video>
    <canvas id="canvas" width="64" height="64"></canvas>

    <script>
        let lightCharacteristic = null;
        let syncInterval = null;

        // We injected your specific 3519 UUID right here!
        const KNOWN_SERVICES = [
            '00003519-0000-1000-8000-00805f9b34fb', // <-- YOUR SECRET KEY
            '0000ffe5-0000-1000-8000-00805f9b34fb', 
            '0000fff0-0000-1000-8000-00805f9b34fb'
        ];

        function updateLog(msg) {
            document.getElementById('log').innerText = msg;
            console.log(msg);
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                updateLog("Requesting Bluetooth Device...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: KNOWN_SERVICES
                });

                updateLog("Connecting to GATT Server...");
                const server = await device.gatt.connect();

                updateLog("Scanning for known Services...");
                const services = await server.getPrimaryServices();
                
                let activeService = null;
                for (let s of services) {
                    if (KNOWN_SERVICES.includes(s.uuid)) {
                        activeService = s;
                        updateLog("Found matching service: " + s.uuid);
                        break;
                    }
                }

                if (!activeService) {
                    alert("Connected, but couldn't find a matching Service UUID.");
                    return;
                }

                updateLog("Scanning for Write Channel...");
                const characteristics = await activeService.getCharacteristics();
                
                // Automatically find the channel that allows sending color data
                for (let c of characteristics) {
                    if (c.properties.writeWithoutResponse || c.properties.write) {
                        lightCharacteristic = c;
                        updateLog("Success! Locked onto Write Channel: " + c.uuid);
                        break;
                    }
                }

                if (lightCharacteristic) {
                    document.getElementById('connectBtn').innerText = "Connected!";
                    document.getElementById('connectBtn').style.backgroundColor = "green";
                }

            } catch (error) {
                updateLog("Error: " + error.message);
                alert("Connection failed. Make sure your phone's Bluetooth is OFF.");
            }
        });

        // --- SCREEN SYNC LOGIC ---
        document.getElementById('syncBtn').addEventListener('click', async () => {
            if (!lightCharacteristic) {
                alert("Please connect to the lights first!");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });

                syncInterval = setInterval(() => {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const frameData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    
                    let r = 0, g = 0, b = 0, count = 0;
                    
                    for (let i = 0; i < frameData.length; i += 16) { 
                        r += frameData[i];
                        g += frameData[i + 1];
                        b += frameData[i + 2];
                        count++;
                    }
                    
                    r = Math.floor(r / count);
                    g = Math.floor(g / count);
                    b = Math.floor(b / count);

                    document.getElementById('colorPreview').style.backgroundColor = `rgb(${r},${g},${b})`;
                    sendColorToLight(r, g, b);

                }, 200);

                stream.getVideoTracks()[0].onended = () => {
                    clearInterval(syncInterval);
                    updateLog("Screen sync stopped.");
                };

            } catch (error) {
                console.error("Screen Capture Error:", error);
            }
        });

        function sendColorToLight(r, g, b) {
            if (!lightCharacteristic) return;
            
            // The data structure sending the color to the lights
            const data = new Uint8Array([0x56, r, g, b, 0x00, 0xf0, 0xaa]);
            lightCharacteristic.writeValueWithoutResponse(data).catch(err => {});
        }
    </script>
</body>
</html>
