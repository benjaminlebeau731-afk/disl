<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LED Sync v2 (Diagnostic Mode)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: #eee; }
        .box { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        button { padding: 12px 20px; margin: 5px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; }
        #connect { background: #3498db; color: white; }
        #sync { background: #2ecc71; color: white; }
        #sync:disabled { background: #444; color: #777; }
        #log { margin-top: 20px; padding: 10px; background: #000; color: #0f0; text-align: left; font-family: monospace; font-size: 12px; height: 120px; overflow-y: auto; border-radius: 5px; border: 1px solid #444; }
        .stat-box { display: flex; justify-content: space-around; margin: 15px 0; font-size: 14px; color: #aaa; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>LED Sync v2</h2>
    
    <div class="stat-box">
        <div>Status: <span id="status">Disconnected</span></div>
        <div>Sent: <span id="count">0</span></div>
    </div>

    <button id="connect">1. Connect Bluetooth</button>
    <button id="sync" disabled>2. Start Sync</button>
    <button id="toggleProtocol" style="background:#555; color:white;">Switch Protocol (A/B)</button>

    <div id="log">> System ready. Turn off phone Bluetooth before starting.</div>
</div>

<canvas id="canvas" width="1" height="1"></canvas>

<script>
    let device, characteristic;
    let packetCount = 0;
    let currentProtocol = 'A'; // A = Triones, B = ELK
    const logEl = document.getElementById('log');
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');
    const syncBtn = document.getElementById('sync');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    function logger(msg, isError = false) {
        const time = new Date().toLocaleTimeString().split(' ')[0];
        logEl.innerHTML = `<span style="color:${isError ? '#f44':'#0f0'}">[${time}] ${msg}</span><br>` + logEl.innerHTML;
    }

    document.getElementById('toggleProtocol').onclick = () => {
        currentProtocol = currentProtocol === 'A' ? 'B' : 'A';
        logger(`Switched to Protocol ${currentProtocol}`);
    };

    document.getElementById('connect').onclick = async () => {
        try {
            logger("Scanning...");
            device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000ffd0-0000-1000-8000-00805f9b34fb', '0000ffe0-0000-1000-8000-00805f9b34fb']
            });

            logger(`Connecting to ${device.name}...`);
            const server = await device.gatt.connect();
            
            // Try Service Discovery
            const services = await server.getPrimaryServices();
            logger(`Found ${services.length} services.`);
            
            // Find the first writable characteristic
            for (const service of services) {
                const chars = await service.getCharacteristics();
                characteristic = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
                if (characteristic) break;
            }

            if (!characteristic) throw new Error("No writable channel found.");

            statusEl.innerText = "Connected";
            statusEl.style.color = "#2ecc71";
            syncBtn.disabled = false;
            logger("Successfully connected!");

        } catch (err) {
            logger(err.message, true);
        }
    };

    syncBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            logger("Screen capture started.");

            setInterval(async () => {
                if (!characteristic) return;

                ctx.drawImage(video, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;

                let data;
                if (currentProtocol === 'A') {
                    // Triones/MeRGBW: [56, R, G, B, White, Type, AA]
                    data = new Uint8Array([0x56, r, g, b, 0x00, 0xf0, 0xaa]);
                } else {
                    // ELK-BLEDOM style: [7e, 00, 05, 03, R, G, B, 00, ef]
                    data = new Uint8Array([0x7e, 0x00, 0x05, 0x03, r, g, b, 0x00, 0xef]);
                }

                try {
                    // Use writeValue to ensure the controller actually got it
                    await characteristic.writeValueWithoutResponse(data);
                    packetCount++;
                    countEl.innerText = packetCount;
                } catch (e) {
                    if (packetCount % 10 === 0) logger("Write error: Device busy", true);
                }
            }, 200); // 5 times per second (much safer)

        } catch (err) {
            logger(err.message, true);
        }
    };
</script>
</body>
</html>
