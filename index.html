<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate LED Screen Sync</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-box { 
            margin: 24px 0; 
            padding: 16px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            font-family: monospace;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .error { border-color: #ef4444; color: #fca5a5; background: rgba(239, 68, 68, 0.1); }
        .success { border-color: var(--success); color: #6ee7b7; background: rgba(16, 185, 129, 0.1); }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        button, select { 
            padding: 16px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        select {
            background: #334155;
            color: white;
            appearance: none;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        select:hover { background: #475569; }

        #connect { background: var(--primary); color: white; }
        #connect:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        #sync { background: var(--success); color: white; }
        #sync:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; }
        #sync:hover:not(:disabled) { background: var(--success-hover); transform: translateY(-2px); }

        .preview-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        #colorPreview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #000;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: background 0.1s ease;
        }

        .instructions {
            text-align: left;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 30px;
            line-height: 1.6;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>LED Screen Sync</h1>
    
    <div id="status" class="status-box">Status: Ready. Turn off phone Bluetooth.</div>
    
    <div class="btn-group">
        <button id="connect">🔌 1. Connect LED Strip</button>
        
        <select id="protocolSelect">
            <option value="triones">Protocol A (Triones / MagicBlue)</option>
            <option value="elk">Protocol B (ELK-BLEDOM / Apollo)</option>
            <option value="simple">Protocol C (Simple RGB / HappyLighting)</option>
        </select>

        <button id="sync" disabled>📺 2. Start Screen Sync</button>
    </div>

    <div class="preview-container">
        <span style="font-size: 14px; color: var(--text-muted);">Live Screen Color:</span>
        <div id="colorPreview"></div>
    </div>

    <div class="instructions">
        <strong>If lights don't change:</strong><br>
        1. Keep the sync running.<br>
        2. Change the Protocol dropdown.<br>
        3. The new protocol will apply instantly.
    </div>
</div>

<canvas id="canvas" width="1" height="1"></canvas>

<script>
    let device, characteristic;
    let syncInterval;
    const connectBtn = document.getElementById('connect');
    const syncBtn = document.getElementById('sync');
    const statusDiv = document.getElementById('status');
    const colorPreview = document.getElementById('colorPreview');
    const protocolSelect = document.getElementById('protocolSelect');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    const SERVICE_UUIDS = [
        '0000ffd0-0000-1000-8000-00805f9b34fb',
        '0000ffe0-0000-1000-8000-00805f9b34fb',
        '0000fff0-0000-1000-8000-00805f9b34fb'
    ];

    function updateStatus(msg, type = '') {
        statusDiv.innerText = "Status: " + msg;
        statusDiv.className = 'status-box ' + type;
    }

    connectBtn.onclick = async () => {
        updateStatus("Scanning... Select your device in the popup.", "");
        
        try {
            device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: SERVICE_UUIDS
            });

            updateStatus(`Found ${device.name || 'Device'}. Connecting...`);
            
            const server = await device.gatt.connect();
            
            let service;
            for (const uuid of SERVICE_UUIDS) {
                try {
                    service = await server.getPrimaryService(uuid);
                    if (service) break;
                } catch (e) { continue; }
            }

            if (!service) throw new Error("Compatible service not found.");

            const characteristics = await service.getCharacteristics();
            characteristic = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

            if (!characteristic) throw new Error("No writable characteristic found.");

            // Try sending wake-up bytes for various models
            await characteristic.writeValue(new Uint8Array([0xcc, 0x23, 0x33])).catch(() => {});
            await characteristic.writeValue(new Uint8Array([0x7e, 0x00, 0x04, 0x01, 0x00, 0x00, 0x00, 0x00, 0xef])).catch(() => {});

            updateStatus("Connected! You can now start sync.", "success");
            syncBtn.disabled = false;
            connectBtn.innerText = "✓ Connected";
            connectBtn.style.background = "#334155";
            connectBtn.style.pointerEvents = "none";

        } catch (err) {
            console.error(err);
            updateStatus(err.message, "error");
        }
    };

    syncBtn.onclick = async () => {
        if (syncBtn.innerText.includes("Stop")) {
            clearInterval(syncInterval);
            syncBtn.innerText = "📺 2. Start Screen Sync";
            syncBtn.style.background = "var(--success)";
            updateStatus("Sync stopped.", "");
            colorPreview.style.background = "#000";
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ 
                video: { cursor: "never" },
                audio: false 
            });
            
            const video = document.createElement('video');
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();

                updateStatus("Sync Active! Try changing the Protocol if lights don't react.", "success");
                syncBtn.innerText = "⏹ Stop Sync";
                syncBtn.style.background = "#ef4444";

                syncInterval = setInterval(async () => {
                    if (!characteristic || !video.videoWidth) return;

                    ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, 1, 1);
                    const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;

                    colorPreview.style.background = `rgb(${r},${g},${b})`;
                    colorPreview.style.boxShadow = `0 0 15px rgb(${r},${g},${b})`;

                    let data;
                    const protocol = protocolSelect.value;

                    // Different LED controllers expect different byte sequences
                    if (protocol === 'triones') {
                        data = new Uint8Array([0x56, r, g, b, 0x00, 0xf0, 0xaa]);
                    } else if (protocol === 'elk') {
                        data = new Uint8Array([0x7e, 0x00, 0x05, 0x03, r, g, b, 0x00, 0xef]);
                    } else if (protocol === 'simple') {
                        data = new Uint8Array([0x00, r, g, b]);
                    }

                    try {
                        if (characteristic.properties.writeWithoutResponse) {
                            await characteristic.writeValueWithoutResponse(data);
                        } else {
                            await characteristic.writeValue(data);
                        }
                    } catch (e) {
                        // Keep going if a frame drops
                    }
                }, 100); 
            };

            stream.getVideoTracks()[0].onended = () => {
                clearInterval(syncInterval);
                syncBtn.innerText = "📺 2. Start Screen Sync";
                syncBtn.style.background = "var(--success)";
                updateStatus("Screen sharing ended by user.", "");
                colorPreview.style.background = "#000";
            };

        } catch (err) {
            updateStatus("Screen capture failed: " + err.message, "error");
        }
    };
</script>

</body>
</html>
